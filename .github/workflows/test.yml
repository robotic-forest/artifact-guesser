name: Test Suite
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            tests/package-lock.json
      - run: npm ci
      - run: npm ci
        working-directory: tests
      - run: npm run test:api
        working-directory: tests
        env:
          SESSION_PASSWORD: ci-test-password-that-is-at-least-32-chars!!
          SECRET: ci-test-jwt-secret
          DOMAIN: http://localhost:3099

  # e2e-tests disabled in CI — Playwright tests are flaky/under-baked. Run
  # locally via `cd tests && npm run test:e2e`. Re-enable once stabilized.
